apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-inference
spec:
  template:
    metadata:
      labels:
        workload-type: gpu-inference
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1
        kind: EC2NodeClass
        name: gpu-nodes
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - g5.xlarge       # 1x A10G, 24GB VRAM
            - g5.2xlarge      # 1x A10G, 24GB VRAM
            - g5.4xlarge      # 1x A10G, 24GB VRAM
            - g5.12xlarge     # 4x A10G, 96GB VRAM
            - g6.xlarge       # 1x L4, 24GB VRAM
            - g6.2xlarge      # 1x L4, 24GB VRAM
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 600s  # 10min idle before reclaim — models take time to load
  limits:
    cpu: "200"
    memory: 800Gi
    nvidia.com/gpu: "20"
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-nodes
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: "KarpenterNodeRole-my-cluster"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-cluster"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi   # Large root volume for model weights
        volumeType: gp3
        iops: 4000
        throughput: 500
        encrypted: true
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 1
  tags:
    workload-type: gpu-inference
    ManagedBy: karpenter
